version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: career-timeline-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_timeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career-timeline-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: career_timeline
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: pnpm dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: career-timeline-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: pnpm dev --host

volumes:
  postgres_data:
